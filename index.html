<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialMind AI — Your Digital Safety Intelligence Agent</title>

<style>
  :root {
    --bg: #0a0d14;
    --bg2: #111520;
    --bg3: #161b2a;
    --surface: #1c2235;
    --surface2: #222840;
    --border: rgba(99,120,255,0.15);
    --border2: rgba(99,120,255,0.3);
    --accent: #6378ff;
    --accent2: #3de8b0;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --text: #e8ecff;
    --text2: #8892b0;
    --text3: #4a5270;
    --danger: #ff4757;
    --warning: #ffd166;
    --safe: #3de8b0;
    --info: #6378ff;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,13,20,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    color: var(--text2);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
  }

  .hero {
    padding: 5rem 2rem 4rem;
    text-align: center;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 700;
    line-height: 1.15;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-sub {
    color: var(--text2);
    max-width: 580px;
    margin: 1rem auto;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #4f63ff);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: 600;
  }

  .section {
    max-width: 900px;
    margin: auto;
    padding: 2rem;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    border-radius: 10px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
  }

  .result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: var(--surface);
  }

  footer {
    text-align: center;
    padding: 30px;
    color: var(--text2);
    border-top: 1px solid var(--border);
  }
</style>
</head>

<body>

<nav>
  <div class="logo">🛡️ SocialMind AI</div>
</nav>

<div class="hero">
  <h1>Stop Scams.<br><em>Stay Safe Online.</em></h1>
  <p class="hero-sub">
    AI-powered system that detects scams, phishing, manipulation, and misinformation in real time.
  </p>
</div>

<div class="section">

<h3>Analyze Message</h3>

<textarea id="text" placeholder="Paste message here..."></textarea>

<input type="password" id="key" placeholder="Enter Anthropic API Key">

<br><br>
<button class="btn-primary" onclick="run()">Analyze</button>

<div id="out" class="result"></div>

</div>

<footer>
  SocialMind AI · AI intelligence system · RoyalPuskar<br>
  <span style="font-size:0.75rem;color:var(--text3)">
    Detecting scams, manipulation, and misinformation in real time.
  </span>
</footer>

<script>
async function run(){
  const text=document.getElementById("text").value;
  const key=document.getElementById("key").value;
  const out=document.getElementById("out");

  if(!text) return out.innerHTML="⚠️ Enter text";
  if(!key.startsWith("sk-ant-")) return out.innerHTML="⚠️ Invalid API key";

  out.innerHTML="Analyzing...";

  const prompt=`
Return JSON only:
{
"risk":"SAFE|WARNING|DANGER",
"score":0-100,
"summary":"short explanation"
}

Text:
${text}
`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:500,
        messages:[{role:"user",content:prompt}]
      })
    });

    const data=await res.json();
    let raw=data.content[0].text;
    let json=JSON.parse(raw.replace(/```/g,""));

    out.innerHTML=`
      <b>Risk:</b> ${json.risk}<br>
      <b>Score:</b> ${json.score}<br>
      <b>Summary:</b> ${json.summary}
    `;
  }
  catch(e){
    out.innerHTML="Error: "+e.message;
  }
}
</script>

</body>
</html>
