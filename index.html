<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialMind AI — Digital Safety Intelligence</title>

<style>
:root {
  --bg:#0a0d14;
  --bg2:#111520;
  --bg3:#161b2a;
  --surface:#1c2235;
  --border:rgba(99,120,255,0.15);
  --text:#e8ecff;
  --text2:#8892b0;
  --accent:#6378ff;
  --accent2:#3de8b0;
  --danger:#ff4757;
  --warning:#ffd166;
  --safe:#3de8b0;
  --radius:12px;
  --radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}
nav{
  position:sticky;top:0;
  background:rgba(10,13,20,.9);
  backdrop-filter:blur(20px);
  padding:0 20px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.logo{font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));
-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.hero{
  text-align:center;
  padding:60px 20px;
}
h1{
  font-size:2.5rem;
}
h1 em{
  font-style:normal;
  color:var(--accent2);
}
.hero p{
  color:var(--text2);
  max-width:600px;
  margin:15px auto;
}

.btn{
  padding:12px 24px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}
.primary{
  background:linear-gradient(135deg,var(--accent),#4f63ff);
  color:white;
}

.section{
  max-width:900px;
  margin:auto;
  padding:20px;
}

textarea{
  width:100%;
  min-height:120px;
  background:var(--bg3);
  border:1px solid var(--border);
  color:white;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg3);
  color:white;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  background:var(--surface);
}

footer{
  text-align:center;
  padding:30px;
  color:var(--text2);
  border-top:1px solid var(--border);
}
</style>
</head>

<body>

<nav>
  <div class="logo">🛡️ SocialMind AI</div>
</nav>

<div class="hero">
  <h1>Stop Scams.<br><em>Stay Safe Online.</em></h1>
  <p>AI-powered system that detects scams, phishing, manipulation, and misinformation in real time.</p>
</div>

<div class="section">

<h3>Analyze Message</h3>
<textarea id="text" placeholder="Paste message here..."></textarea>

<input type="password" id="key" placeholder="Enter Anthropic API Key (sk-ant-...)">

<br><br>
<button class="btn primary" onclick="run()">Analyze</button>

<div id="out" class="result"></div>

</div>

<footer>
SocialMind AI · AI Safety Intelligence System · Beta<br>
© 2026 SocialMind AI
</footer>

<script>
async function run(){
  const text=document.getElementById("text").value;
  const key=document.getElementById("key").value;
  const out=document.getElementById("out");

  if(!text) return out.innerHTML="⚠️ Enter text";
  if(!key.startsWith("sk-ant-")) return out.innerHTML="⚠️ Invalid API key";

  out.innerHTML="Analyzing...";

  const prompt = `
You are a scam detection AI.
Return JSON only:
{
"risk":"SAFE|WARNING|DANGER",
"score":0-100,
"summary":"short explanation"
}

Text:
${text}
`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:500,
        messages:[{role:"user",content:prompt}]
      })
    });

    const data=await res.json();
    let raw=data.content[0].text;
    let json=JSON.parse(raw.replace(/```/g,""));

    out.innerHTML=`
    <b>Risk:</b> ${json.risk}<br>
    <b>Score:</b> ${json.score}<br>
    <b>Summary:</b> ${json.summary}
    `;
  }
  catch(e){
    out.innerHTML="Error: "+e.message;
  }
}
</script>

</body>
</html>
